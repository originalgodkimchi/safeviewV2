# nginx 설정 — SAFEVIEW 단일 서버 (React + FastAPI)
# your-name.duckdns.org → 실제 도메인으로 교체

server {
    listen 80;
    server_name your-name.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-name.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/your-name.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-name.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── React 프론트엔드 (정적 파일) ───────────────
    root /home/ubuntu/safeviewV2/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;  # React Router 지원
    }

    # ── FastAPI REST API ────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;       # MJPEG 스트림 필수
        proxy_read_timeout 3600s;
    }

    # ── WebSocket ───────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── 이벤트 파일 ─────────────────────────────────
    location /events-files/ {
        proxy_pass http://127.0.0.1:8000;
    }

    # ── MediaMTX HLS (카메라 원본 스트림) ───────────
    location /hls/ {
        proxy_pass       http://127.0.0.1:8888/;
        proxy_buffering  off;
        add_header       Cache-Control no-cache;
        add_header       Access-Control-Allow-Origin *;
    }
}
