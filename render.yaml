services:
  - type: web
    name: safeview-v2-backend
    env: python
    region: singapore        # 한국과 가장 가까운 리전
    plan: free               # 무료 플랜 (RAM 512MB, CPU, 15분 비활성 시 슬립)
    buildCommand: >
      pip install -r requirements.txt &&
      python -c "from ultralytics import YOLO; YOLO('yolov8n.pt')"
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
